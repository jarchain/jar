# Prometheus scrape configuration for Grey testnet
# Scrapes metrics from all 6 validators via Docker internal network.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "grey-validators"
    static_configs:
      - targets:
          - "validator-0:9615"
          - "validator-1:9615"
          - "validator-2:9615"
          - "validator-3:9615"
          - "validator-4:9615"
          - "validator-5:9615"
    metrics_path: /metrics
    scrape_interval: 5s
