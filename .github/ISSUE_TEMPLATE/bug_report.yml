name: Bug Report
description: Report a bug in the Grey node or JAR specification
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: "When I run grey with --test, it panics with..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the issue
      placeholder: |
        1. Run `cargo run --bin grey -- --test`
        2. Wait for block 15
        3. Observe panic...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  - type: input
    id: grey_version
    attributes:
      label: Grey Version / Commit
      description: The version or commit hash you're running
      placeholder: "e.g., v0.8.0 or abc1234"
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
